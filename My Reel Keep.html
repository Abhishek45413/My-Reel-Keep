<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ReelKeep</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f2;
      --ink: #151712;
      --muted: #62695f;
      --card: #fffffb;
      --soft: #edf1e8;
      --line: #dce2d5;
      --primary: #136c63;
      --primary-ink: #ffffff;
      --coral: #c05f45;
      --gold: #d7ae45;
      --blue: #356a9a;
      --danger: #ab3f37;
      --shadow: 0 24px 70px rgba(30, 43, 34, 0.14);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 12% 4%, rgba(19, 108, 99, 0.18), transparent 30rem),
        radial-gradient(circle at 88% 12%, rgba(215, 174, 69, 0.18), transparent 26rem),
        linear-gradient(135deg, #f5f7f2 0%, #eef4f0 50%, #f8f1eb 100%);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(236px, 278px) minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px 18px;
      border-right: 1px solid rgba(21, 23, 18, 0.09);
      background: rgba(255, 255, 251, 0.72);
      backdrop-filter: blur(22px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 22px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      background: var(--ink);
      color: #fff;
      box-shadow: var(--shadow);
    }

    .brand strong {
      display: block;
      font-size: 23px;
      letter-spacing: 0;
      line-height: 1;
    }

    .brand span {
      color: var(--muted);
      font-size: 13px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav-btn,
    .btn,
    .icon-btn {
      min-height: 42px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      color: var(--ink);
      background: transparent;
      transition: transform 150ms ease, background 150ms ease, color 150ms ease, border 150ms ease;
    }

    .nav-btn {
      justify-content: flex-start;
      padding: 0 12px;
      color: var(--muted);
    }

    .nav-btn:hover,
    .btn.secondary:hover,
    .icon-btn:hover {
      background: var(--soft);
      color: var(--ink);
    }

    .nav-btn.active {
      background: var(--ink);
      color: #fff;
    }

    .icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .side-note {
      align-self: end;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 251, 0.68);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .side-stats {
      display: grid;
      gap: 10px;
    }

    .mini-stat {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 251, 0.75);
      padding: 12px;
    }

    .mini-stat span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .mini-stat strong {
      display: block;
      margin-top: 4px;
      font-size: 26px;
      line-height: 1;
    }

    .main {
      width: min(100%, 1360px);
      padding: 28px;
      display: grid;
      gap: 22px;
      align-content: start;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(19, 108, 99, 0.11);
      color: var(--primary);
      font-weight: 700;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 10px;
      max-width: 820px;
      font-size: clamp(32px, 5vw, 68px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 720px;
      color: var(--muted);
      font-size: clamp(15px, 1.8vw, 18px);
      line-height: 1.55;
      margin-bottom: 0;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      padding: 0 14px;
      border: 1px solid transparent;
      font-weight: 750;
      white-space: nowrap;
    }

    .btn.primary {
      background: var(--primary);
      color: var(--primary-ink);
    }

    .btn.secondary,
    .icon-btn {
      background: rgba(255, 255, 251, 0.82);
      border-color: var(--line);
    }

    .btn.danger {
      background: var(--danger);
      color: #fff;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .icon-btn {
      width: 42px;
      padding: 0;
    }

    .insight-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-card,
    .panel,
    .value-card,
    .source-card,
    .reel-card {
      border: 1px solid rgba(21, 23, 18, 0.1);
      border-radius: var(--radius);
      background: rgba(255, 255, 251, 0.82);
      box-shadow: var(--shadow);
    }

    .metric-card {
      min-height: 112px;
      padding: 15px;
      display: grid;
      align-content: space-between;
      gap: 12px;
    }

    .metric-card span,
    .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .metric-card strong {
      font-size: 28px;
      line-height: 1;
    }

    .metric-card p {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 0;
    }

    .view {
      display: grid;
      gap: 18px;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(320px, 1.05fr) minmax(300px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
    }

    .panel-head,
    .panel-body {
      padding: 18px;
    }

    .panel-head {
      padding-bottom: 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .panel h2,
    .panel h3 {
      margin-bottom: 5px;
      font-size: 19px;
      letter-spacing: 0;
    }

    .panel p {
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 0;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      font-weight: 750;
      font-size: 13px;
    }

    .field input,
    .field textarea,
    .field select,
    .toolbar input,
    .toolbar select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fffefa;
      color: var(--ink);
      min-height: 44px;
      padding: 10px 12px;
      outline-color: var(--primary);
    }

    .field textarea {
      min-height: 160px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .form-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      flex-wrap: wrap;
    }

    .quality {
      min-width: min(100%, 260px);
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
    }

    .track {
      height: 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--soft);
      overflow: hidden;
    }

    .track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--gold));
      transition: width 180ms ease;
    }

    .preview-grid {
      display: grid;
      gap: 12px;
    }

    .value-card {
      padding: 14px;
      box-shadow: none;
      background: linear-gradient(135deg, rgba(19, 108, 99, 0.12), rgba(255, 255, 251, 0.84));
    }

    .value-card:nth-child(2) {
      background: linear-gradient(135deg, rgba(192, 95, 69, 0.12), rgba(255, 255, 251, 0.84));
    }

    .value-card p {
      color: var(--ink);
      margin-top: 7px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 28px;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
    }

    .review-card {
      min-height: 310px;
      padding: clamp(18px, 4vw, 30px);
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background:
        linear-gradient(135deg, rgba(19, 108, 99, 0.12), transparent 45%),
        #fffefa;
      display: grid;
      align-content: space-between;
      gap: 20px;
    }

    .review-card h2 {
      margin: 10px 0;
      font-size: clamp(24px, 4vw, 42px);
      line-height: 1.06;
    }

    .answer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      line-height: 1.55;
    }

    .review-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topic-list {
      display: grid;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: minmax(76px, 120px) 1fr 42px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .bar {
      height: 12px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--blue));
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) minmax(150px, 220px) auto;
      gap: 12px;
      align-items: center;
    }

    .library-list,
    .source-grid {
      display: grid;
      gap: 12px;
    }

    .source-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .reel-card,
    .source-card {
      padding: 16px;
      display: grid;
      gap: 12px;
      box-shadow: none;
    }

    .reel-card header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .reel-card h3,
    .source-card h3 {
      margin-bottom: 4px;
      font-size: 17px;
      line-height: 1.25;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .takeaways {
      margin: 0;
      padding-left: 19px;
      line-height: 1.5;
    }

    .takeaways li::marker {
      color: var(--primary);
    }

    .empty-state {
      min-height: 236px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 251, 0.56);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 26px;
      color: var(--muted);
    }

    .empty-state strong {
      display: block;
      color: var(--ink);
      margin-bottom: 6px;
      font-size: 18px;
    }

    .empty-actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 10;
      max-width: min(360px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      box-shadow: var(--shadow);
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1080px) {
      .app-shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: sticky;
        top: 0;
        z-index: 4;
        height: auto;
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
        align-items: center;
        border-right: 0;
        border-bottom: 1px solid rgba(21, 23, 18, 0.09);
      }

      .nav {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .side-stats {
        grid-column: 1 / -1;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .side-note {
        display: none;
      }

      .two-col,
      .hero {
        grid-template-columns: 1fr;
      }

      .hero-actions {
        justify-content: flex-start;
      }

      .insight-strip {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .main,
      .sidebar {
        padding: 16px;
      }

      .sidebar {
        gap: 14px;
      }

      .brand-mark {
        width: 40px;
        height: 40px;
      }

      .brand strong {
        font-size: 20px;
      }

      .nav {
        grid-column: 1 / -1;
        grid-template-columns: repeat(4, 1fr);
        position: fixed;
        left: 10px;
        right: 10px;
        bottom: 10px;
        z-index: 8;
        padding: 8px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(255, 255, 251, 0.92);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .nav-btn {
        min-height: 48px;
        justify-content: center;
        padding: 0 6px;
        font-size: 12px;
        flex-direction: column;
        gap: 3px;
      }

      .side-stats,
      .insight-strip,
      .form-row,
      .toolbar,
      .source-grid {
        grid-template-columns: 1fr;
      }

      .panel-head,
      .reel-card header,
      .form-footer {
        display: grid;
        grid-template-columns: 1fr;
      }

      .btn,
      .icon-btn,
      .review-actions .btn {
        width: 100%;
      }

      .bar-row {
        grid-template-columns: 80px 1fr 34px;
      }

      .toast {
        bottom: 82px;
        left: 16px;
        right: 16px;
      }

      body {
        padding-bottom: 82px;
      }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="empty-state">
      <div>
        <strong>Loading ReelKeep.</strong>
        <div>The React app will start in a moment.</div>
      </div>
    </div>
  </div>

  <script>
    const h = React.createElement;
    const { useEffect, useMemo, useState } = React;
    const storageKey = "reelkeep-react-v2";

    const icons = {
      capture: '<path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
      review: '<path d="m16 3 4 4-4 4M20 7H8a4 4 0 0 0 0 8h8M8 21l-4-4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
      library: '<path d="M4.5 6.5A2.5 2.5 0 0 1 7 4h12v16H7a2.5 2.5 0 0 1-2.5-2.5v-11Z" stroke="currentColor" stroke-width="1.8"/><path d="M7 4v16M10 8h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
      scroll: '<path d="M8 6h8M8 12h8M8 18h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M5 4.5h14v15H5z" stroke="currentColor" stroke-width="1.8"/>',
      reset: '<path d="M4 4v6h6M20 20v-6h-6M5 14a7 7 0 0 0 12 3l3-3M19 10A7 7 0 0 0 7 7l-3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
      export: '<path d="M12 4v11m0 0 4-4m-4 4-4-4M5 19h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
      trash: '<path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>',
      link: '<path d="M10 13a5 5 0 0 0 7.1 0l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1M14 11a5 5 0 0 0-7.1 0l-2 2A5 5 0 0 0 12 20.1l1.1-1.1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>',
      spark: '<path d="M12 3l1.9 5.2L19 10l-5.1 1.8L12 17l-1.9-5.2L5 10l5.1-1.8L12 3Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>'
    };

    const starterQueue = [
      {
        title: "The two minute rule for beating procrastination",
        platform: "TikTok",
        topic: "Habits",
        notes: "Start any task by doing only the first two minutes. The goal is not to finish, it is to lower the activation energy and become the kind of person who starts. Once started, momentum often carries the next step."
      },
      {
        title: "Why explaining a concept reveals gaps",
        platform: "YouTube Shorts",
        topic: "Learning",
        notes: "When you teach an idea in plain language, missing links become obvious. Use simple words, find the stuck point, then return to the source and simplify again."
      },
      {
        title: "A quick way to remember names",
        platform: "Instagram",
        topic: "Social",
        notes: "Repeat the person's name once, connect it to a visual detail, and use it naturally before the conversation ends. Retrieval soon after hearing the name strengthens recall."
      },
      {
        title: "The 10-10-10 decision frame",
        platform: "LinkedIn",
        topic: "Decision making",
        notes: "Ask how a choice will feel in 10 minutes, 10 months, and 10 years. The frame separates immediate discomfort from durable consequences."
      }
    ];

    const sampleReels = [
      {
        title: "Sleep turns hard problems into solvable ones",
        platform: "YouTube Shorts",
        topic: "Learning",
        url: "https://example.com/sleep-problem-solving",
        notes: "Sleep helps the brain replay recent experience and connect distant ideas. If a problem feels stuck, write the exact question before bed and review it after waking. The useful move is not passive waiting; it is giving the brain a clean prompt and enough rest to reorganize the material."
      },
      {
        title: "Use a friction log before buying productivity tools",
        platform: "Instagram",
        topic: "Workflows",
        url: "https://example.com/friction-log",
        notes: "Before adding a new tool, track where work actually slows down for one week. Write the trigger, the delay, and the workaround. Buy or automate only the repeated friction, not the vague feeling of being busy."
      }
    ];

    function Icon({ name }) {
      return h("svg", {
        className: "icon",
        viewBox: "0 0 24 24",
        fill: "none",
        "aria-hidden": "true",
        dangerouslySetInnerHTML: { __html: icons[name] || icons.spark }
      });
    }

    function makeId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2);
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function addDays(days) {
      const next = new Date();
      next.setDate(next.getDate() + days);
      return next.toISOString().slice(0, 10);
    }

    function distill(text, topic) {
      const clean = text.replace(/\s+/g, " ").trim();
      const sentences = clean
        .split(/(?<=[.!?])\s+/)
        .map((sentence) => sentence.trim())
        .filter((sentence) => sentence.length > 22);
      const takeaways = sentences.slice(0, 3);
      while (takeaways.length < 3 && clean) {
        takeaways.push(clean.slice(0, 150));
      }
      const keywords = [...new Set(clean
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, " ")
        .split(/\s+/)
        .filter((word) => word.length > 4 && !["about", "their", "there", "which", "before", "after", "because", "should", "would", "could", "video", "reels"].includes(word)))]
        .slice(0, 6);
      const cards = takeaways.map((takeaway, index) => ({
        id: makeId(),
        question: index === 0 ? "What is the core idea from this reel?" : "How would you use this idea later?",
        answer: takeaway,
        interval: 1,
        due: today(),
        reviews: 0,
        ease: 2.2,
        topic
      }));
      return { takeaways, keywords, cards };
    }

    function normalizeReel(reel) {
      const distilled = distill(reel.notes, reel.topic);
      return {
        ...reel,
        id: reel.id || makeId(),
        createdAt: reel.createdAt || today(),
        takeaways: distilled.takeaways,
        keywords: distilled.keywords,
        cards: distilled.cards
      };
    }

    function loadInitialState() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "null");
        if (saved && Array.isArray(saved.reels)) return saved;
        const previous = JSON.parse(localStorage.getItem("reelkeep-state-v1") || "null");
        if (previous && Array.isArray(previous.reels)) return previous;
      } catch (error) {
        console.warn(error);
      }
      return { reels: [] };
    }

    function EmptyState({ title, body, children }) {
      return h("div", { className: "empty-state" },
        h("div", null,
          h("strong", null, title),
          h("div", null, body),
          children ? h("div", { className: "empty-actions" }, children) : null
        )
      );
    }

    function App() {
      const [state, setState] = useState(loadInitialState);
      const [tab, setTab] = useState("capture");
      const [form, setForm] = useState({ title: "", platform: "Instagram", topic: "", url: "", notes: "" });
      const [query, setQuery] = useState("");
      const [topicFilter, setTopicFilter] = useState("all");
      const [activeCardId, setActiveCardId] = useState(null);
      const [answerVisible, setAnswerVisible] = useState(false);
      const [toast, setToast] = useState("");

      useEffect(() => {
        localStorage.setItem(storageKey, JSON.stringify(state));
      }, [state]);

      useEffect(() => {
        if (!toast) return;
        const timer = window.setTimeout(() => setToast(""), 2200);
        return () => window.clearTimeout(timer);
      }, [toast]);

      const allCards = useMemo(() => state.reels.flatMap((reel) => (reel.cards || []).map((card) => ({
        ...card,
        reelId: reel.id,
        reelTitle: reel.title,
        platform: reel.platform
      }))), [state.reels]);

      const dueCards = useMemo(() => allCards.filter((card) => card.due <= today()).sort((a, b) => a.due.localeCompare(b.due)), [allCards]);
      const activeCard = dueCards.find((card) => card.id === activeCardId) || dueCards[0] || null;
      const topics = useMemo(() => [...new Set(state.reels.map((reel) => reel.topic).filter(Boolean))].sort((a, b) => a.localeCompare(b)), [state.reels]);
      const ideaCount = state.reels.reduce((sum, reel) => sum + (reel.takeaways || []).length, 0);
      const retainedCount = allCards.filter((card) => card.reviews > 0).length;
      const preview = form.notes.trim() ? distill(form.notes, form.topic || "Topic") : null;
      const wordCount = form.notes.trim() ? form.notes.trim().split(/\s+/).length : 0;
      const qualityPercent = Math.min(100, Math.max(8, Math.round((wordCount / 60) * 100)));

      function notify(message) {
        setToast(message);
      }

      function addReel(reel) {
        setState((current) => ({ reels: [normalizeReel(reel), ...current.reels] }));
      }

      function loadTrial(force) {
        if (state.reels.length && !force) {
          notify("You already have saved reels.");
          return;
        }
        const reels = sampleReels.map((reel) => normalizeReel({ ...reel, id: makeId(), createdAt: today() }));
        setState({ reels });
        setActiveCardId(null);
        setAnswerVisible(false);
        setTab("review");
        notify("Trial knowledge added.");
      }

      function resetDemo() {
        setState({ reels: [] });
        setQuery("");
        setTopicFilter("all");
        setActiveCardId(null);
        setAnswerVisible(false);
        setTab("capture");
        notify("Demo reset.");
      }

      function submitCapture(event) {
        event.preventDefault();
        addReel({ ...form, title: form.title.trim(), topic: form.topic.trim(), url: form.url.trim(), notes: form.notes.trim() });
        setForm({ title: "", platform: "Instagram", topic: "", url: "", notes: "" });
        setActiveCardId(null);
        setAnswerVisible(false);
        setTab("review");
        notify("Saved. Review cards are ready.");
      }

      function gradeCard(grade) {
        if (!activeCard) return;
        setState((current) => ({
          reels: current.reels.map((reel) => reel.id !== activeCard.reelId ? reel : {
            ...reel,
            cards: reel.cards.map((card) => {
              if (card.id !== activeCard.id) return card;
              if (grade === "again") {
                return { ...card, reviews: card.reviews + 1, interval: 1, ease: Math.max(1.4, card.ease - 0.25), due: addDays(1) };
              }
              const nextInterval = Math.max(2, Math.ceil(card.interval * card.ease));
              return { ...card, reviews: card.reviews + 1, interval: nextInterval, ease: Math.min(3, card.ease + 0.08), due: addDays(nextInterval) };
            })
          })
        }));
        setActiveCardId(null);
        setAnswerVisible(false);
        notify(grade === "again" ? "Card moved to tomorrow." : "Nice. Next review scheduled.");
      }

      function deleteReel(id) {
        setState((current) => ({ reels: current.reels.filter((reel) => reel.id !== id) }));
        notify("Reel removed.");
      }

      function exportData() {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "reelkeep-export.json";
        link.click();
        URL.revokeObjectURL(link.href);
      }

      const filteredReels = state.reels.filter((reel) => {
        const haystack = [reel.title, reel.platform, reel.topic, reel.notes, ...(reel.takeaways || []), ...(reel.keywords || [])].join(" ").toLowerCase();
        const topicMatch = topicFilter === "all" || reel.topic === topicFilter;
        return topicMatch && haystack.includes(query.toLowerCase().trim());
      });

      const topicCounts = topics.map((topic) => ({
        topic,
        count: state.reels.filter((reel) => reel.topic === topic).reduce((sum, reel) => sum + (reel.takeaways || []).length, 0)
      })).sort((a, b) => b.count - a.count);
      const maxTopic = Math.max(1, ...topicCounts.map((item) => item.count));

      const nav = [
        ["capture", "Capture", "capture"],
        ["review", "Review", "review"],
        ["library", "Library", "library"],
        ["scroll", "Scroll", "scroll"]
      ];

      return h("div", { className: "app-shell" },
        h("aside", { className: "sidebar", "aria-label": "Workspace navigation" },
          h("div", { className: "brand" },
            h("div", { className: "brand-mark" }, h(Icon, { name: "spark" })),
            h("div", null, h("strong", null, "ReelKeep"), h("span", null, "Scroll less empty."))
          ),
          h("nav", { className: "nav", "aria-label": "Primary" }, nav.map(([id, label, icon]) =>
            h("button", { key: id, type: "button", className: "nav-btn" + (tab === id ? " active" : ""), onClick: () => { setTab(id); setAnswerVisible(false); } },
              h(Icon, { name: icon }), label
            )
          )),
          h("div", { className: "side-stats" },
            h("div", { className: "mini-stat" }, h("span", null, "Saved reels"), h("strong", null, state.reels.length)),
            h("div", { className: "mini-stat" }, h("span", null, "Cards due"), h("strong", null, dueCards.length)),
            h("div", { className: "mini-stat" }, h("span", null, "Kept ideas"), h("strong", null, ideaCount))
          ),
          h("div", { className: "side-note" }, "Client demo tip: click Try sample, review one card, then open Library to show the saved knowledge trail.")
        ),
        h("main", { className: "main" },
          h("section", { className: "hero" },
            h("div", null,
              h("div", { className: "eyebrow" }, h(Icon, { name: "spark" }), "React knowledge app"),
              h("h1", null, "Turn the reels you scroll into knowledge you keep."),
              h("p", null, "Capture a short-form video, extract the useful idea, and review it later with a simple memory workflow built for busy learners.")
            ),
            h("div", { className: "hero-actions" },
              h("button", { className: "btn secondary", type: "button", onClick: () => loadTrial(false) }, h(Icon, { name: "capture" }), "Try sample"),
              h("button", { className: "btn secondary", type: "button", onClick: resetDemo }, h(Icon, { name: "reset" }), "Reset demo"),
              h("button", { className: "btn primary", type: "button", onClick: () => setTab("capture") }, h(Icon, { name: "capture" }), "Add reel")
            )
          ),
          h("section", { className: "insight-strip", "aria-label": "Product summary" },
            h("div", { className: "metric-card" }, h("span", null, "Capture"), h("strong", null, state.reels.length), h("p", null, "Source-linked reels saved")),
            h("div", { className: "metric-card" }, h("span", null, "Convert"), h("strong", null, ideaCount), h("p", null, "Takeaways generated")),
            h("div", { className: "metric-card" }, h("span", null, "Review"), h("strong", null, dueCards.length), h("p", null, "Cards waiting today")),
            h("div", { className: "metric-card" }, h("span", null, "Retain"), h("strong", null, retainedCount), h("p", null, "Ideas already reviewed"))
          ),
          tab === "capture" && h(CaptureView, { form, setForm, submitCapture, preview, wordCount, qualityPercent }),
          tab === "review" && h(ReviewView, { activeCard, answerVisible, setAnswerVisible, gradeCard, loadTrial, setTab, topicCounts, maxTopic }),
          tab === "library" && h(LibraryView, { filteredReels, query, setQuery, topics, topicFilter, setTopicFilter, deleteReel, exportData }),
          tab === "scroll" && h(ScrollView, { addReel, setTab, notify })
        ),
        h("div", { className: "toast" + (toast ? " show" : ""), role: "status", "aria-live": "polite" }, toast)
      );
    }

    function CaptureView({ form, setForm, submitCapture, preview, wordCount, qualityPercent }) {
      const update = (field) => (event) => setForm((current) => ({ ...current, [field]: event.target.value }));
      const qualityText = wordCount < 12 ? `${wordCount} words - add detail for better cards` : wordCount < 40 ? `${wordCount} words - enough for a quick review card` : `${wordCount} words - strong capture ready`;
      return h("section", { className: "view" },
        h("div", { className: "two-col" },
          h("article", { className: "panel" },
            h("div", { className: "panel-head" }, h("div", null, h("h2", null, "Capture a reel"), h("p", null, "Paste a link, transcript, caption, or rough notes before the useful part disappears into the feed."))),
            h("div", { className: "panel-body" },
              h("form", { className: "form", onSubmit: submitCapture },
                h("div", { className: "field" }, h("label", { htmlFor: "title" }, "Title or hook"), h("input", { id: "title", required: true, value: form.title, onChange: update("title"), placeholder: "Example: Why sleep fixes hard problems" })),
                h("div", { className: "form-row" },
                  h("div", { className: "field" }, h("label", { htmlFor: "platform" }, "Platform"), h("select", { id: "platform", value: form.platform, onChange: update("platform") }, ["Instagram", "TikTok", "YouTube Shorts", "LinkedIn", "Other"].map((item) => h("option", { key: item }, item)))),
                  h("div", { className: "field" }, h("label", { htmlFor: "topic" }, "Topic"), h("input", { id: "topic", required: true, value: form.topic, onChange: update("topic"), placeholder: "Learning, health, finance" }))
                ),
                h("div", { className: "field" }, h("label", { htmlFor: "url" }, "Source link"), h("input", { id: "url", type: "url", value: form.url, onChange: update("url"), placeholder: "https://..." })),
                h("div", { className: "field" }, h("label", { htmlFor: "notes" }, "Transcript, caption, or your notes"), h("textarea", { id: "notes", required: true, value: form.notes, onChange: update("notes"), placeholder: "Paste the transcript or jot the useful points here." })),
                h("div", { className: "form-footer" },
                  h("div", { className: "quality", "aria-live": "polite" }, h("span", null, qualityText), h("div", { className: "track", "aria-hidden": "true" }, h("span", { style: { width: qualityPercent + "%" } }))),
                  h("button", { className: "btn primary", type: "submit" }, h(Icon, { name: "review" }), "Save and make review cards")
                )
              )
            )
          ),
          h("article", { className: "panel" },
            h("div", { className: "panel-head" }, h("div", null, h("h2", null, "Live knowledge preview"), h("p", null, "React updates this instantly as your notes become takeaways and memory cards."))),
            h("div", { className: "panel-body preview-grid" },
              h("div", { className: "value-card" }, h("span", { className: "label" }, "Takeaway"), h("p", null, preview ? preview.takeaways[0] : "Clear notes become compact claims you can revisit.")),
              h("div", { className: "value-card" }, h("span", { className: "label" }, "Review card"), h("p", null, preview ? preview.cards[0].question + " " + preview.cards[0].answer : "Each useful idea becomes a question that comes back when memory starts to fade.")),
              h("div", { className: "chips" }, (preview?.keywords.length ? preview.keywords : ["Capture", "Distill", "Review"]).map((word) => h("span", { className: "chip", key: word }, word)))
            )
          )
        )
      );
    }

    function ReviewView({ activeCard, answerVisible, setAnswerVisible, gradeCard, loadTrial, setTab, topicCounts, maxTopic }) {
      return h("section", { className: "view" },
        h("div", { className: "two-col" },
          h("article", { className: "panel" },
            h("div", { className: "panel-head" }, h("div", null, h("h2", null, "Daily review"), h("p", null, "The app brings useful ideas back before they fade."))),
            h("div", { className: "panel-body" },
              activeCard ? h("div", { className: "review-card" },
                h("div", null,
                  h("span", { className: "label" }, `${activeCard.topic} from ${activeCard.platform}`),
                  h("h2", null, activeCard.question),
                  h("p", { className: "meta" }, "Source: " + activeCard.reelTitle),
                  answerVisible ? h("div", { className: "answer" }, activeCard.answer) : null
                ),
                h("div", { className: "review-actions" },
                  answerVisible
                    ? [h("button", { key: "again", className: "btn danger", type: "button", onClick: () => gradeCard("again") }, "Again tomorrow"), h("button", { key: "got", className: "btn primary", type: "button", onClick: () => gradeCard("got") }, "Got it")]
                    : h("button", { className: "btn secondary", type: "button", onClick: () => setAnswerVisible(true) }, "Show answer")
                )
              ) : h(EmptyState, { title: "No cards due.", body: "Load trial data or save a reel to start reviewing." },
                h("button", { className: "btn primary", type: "button", onClick: () => loadTrial(true) }, "Load trial data"),
                h("button", { className: "btn secondary", type: "button", onClick: () => setTab("capture") }, "Add a reel")
              )
            )
          ),
          h("article", { className: "panel" },
            h("div", { className: "panel-head" }, h("div", null, h("h2", null, "Memory momentum"), h("p", null, "See where the client is building reusable knowledge."))),
            h("div", { className: "panel-body topic-list" },
              topicCounts.length ? topicCounts.map((item) =>
                h("div", { className: "bar-row", key: item.topic },
                  h("span", null, item.topic),
                  h("div", { className: "bar", "aria-label": `${item.topic} ${item.count} ideas` }, h("span", { style: { width: Math.max(8, (item.count / maxTopic) * 100) + "%" } })),
                  h("strong", null, item.count)
                )
              ) : h(EmptyState, { title: "No topics yet.", body: "Saved reels will map themselves here." })
            )
          )
        )
      );
    }

    function LibraryView({ filteredReels, query, setQuery, topics, topicFilter, setTopicFilter, deleteReel, exportData }) {
      return h("section", { className: "view" },
        h("article", { className: "panel" },
          h("div", { className: "panel-head" }, h("div", null, h("h2", null, "Knowledge library"), h("p", null, "Search and filter the ideas saved from short-form videos."))),
          h("div", { className: "panel-body" },
            h("div", { className: "toolbar" },
              h("input", { value: query, onChange: (event) => setQuery(event.target.value), placeholder: "Search saved knowledge", "aria-label": "Search saved knowledge" }),
              h("select", { value: topicFilter, onChange: (event) => setTopicFilter(event.target.value), "aria-label": "Filter by topic" },
                h("option", { value: "all" }, "All topics"),
                topics.map((topic) => h("option", { key: topic, value: topic }, topic))
              ),
              h("button", { className: "btn secondary", type: "button", onClick: exportData }, h(Icon, { name: "export" }), "Export")
            ),
            h("div", { className: "library-list", style: { marginTop: 14 } },
              filteredReels.length ? filteredReels.map((reel) =>
                h("article", { className: "reel-card", key: reel.id },
                  h("header", null,
                    h("div", null, h("h3", null, reel.title), h("div", { className: "meta" }, `${reel.platform} - ${reel.topic} - ${reel.createdAt}`)),
                    h("div", { className: "review-actions" },
                      reel.url ? h("a", { className: "icon-btn", href: reel.url, target: "_blank", rel: "noreferrer", "aria-label": "Open source" }, h(Icon, { name: "link" })) : null,
                      h("button", { className: "icon-btn", type: "button", onClick: () => deleteReel(reel.id), "aria-label": "Delete reel" }, h(Icon, { name: "trash" }))
                    )
                  ),
                  h("ul", { className: "takeaways" }, reel.takeaways.map((takeaway) => h("li", { key: takeaway }, takeaway))),
                  h("div", { className: "chips" }, reel.keywords.map((word) => h("span", { className: "chip", key: word }, word)))
                )
              ) : h(EmptyState, { title: "No matching reels.", body: "Try another search, change the topic filter, or add trial data." })
            )
          )
        )
      );
    }

    function ScrollView({ addReel, setTab, notify }) {
      return h("section", { className: "view" },
        h("article", { className: "panel" },
          h("div", { className: "panel-head" }, h("div", null, h("h2", null, "Curated scroll queue"), h("p", null, "A calmer feed that only keeps clips worth turning into knowledge."))),
          h("div", { className: "panel-body source-grid" },
            starterQueue.map((item) =>
              h("article", { className: "source-card", key: item.title },
                h("span", { className: "chip" }, `${item.platform} - ${item.topic}`),
                h("h3", null, item.title),
                h("p", null, item.notes),
                h("button", { className: "btn secondary", type: "button", onClick: () => { addReel(item); setTab("review"); notify("Saved from the queue."); } }, h(Icon, { name: "capture" }), "Keep this")
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
